# Static HTML for GitHub Pages (published as-is; no Jekyll).
# Repo: Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (HTML + assets only)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          if [[ -f .nojekyll ]]; then cp .nojekyll _site/; else touch _site/.nojekyll; fi
          shopt -s nullglob
          html=(./*.html)
          if (( ${#html[@]} == 0 )); then
            echo "No HTML files at repo root"; exit 1
          fi
          cp "${html[@]}" _site/
          if [[ ! -d assets ]]; then
            echo "Missing assets/"; exit 1
          fi
          cp -r assets _site/
          # Shared nav + branding + deck images (animations use these + inline CSS/JS)
          test -f _site/assets/deck-nav.css
          test -f _site/assets/logo-signos.png
          test -f _site/assets/cover-signos.png
          test -f _site/index.html
          echo "Site root contains:" && ls -la _site

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
